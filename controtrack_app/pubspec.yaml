name: controtrack
description: "ControTrack - Professional Fleet Management & Tracking"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  # Navigation
  go_router: ^15.1.2
  # HTTP
  dio: ^5.7.0
  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.4
  # Maps
  google_maps_flutter: ^2.9.0
  google_maps_flutter_web: ^0.5.10
  # UI
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  fl_chart: ^0.70.2
  flutter_animate: ^4.5.2
  # Utilities
  intl: ^0.20.2
  timeago: ^3.7.0
  geolocator: ^13.0.2
  url_launcher: ^6.3.1
  # Push Notifications (self-hosted WebSocket)
  web_socket_channel: ^3.0.1
  flutter_local_notifications: ^18.0.1
  permission_handler: ^12.0.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
