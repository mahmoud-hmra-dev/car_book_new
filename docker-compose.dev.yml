services:
  mongo:
    image: mongo:latest
    command: mongod --quiet --logpath /dev/null
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    ports:
      - 27018:27017
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb

  mongo-express:
    image: mongo-express:latest
    restart: always
    ports:
      - 8084:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      - mongo

  traccar-db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: traccar
      POSTGRES_USER: traccar
      POSTGRES_PASSWORD: traccar
    ports:
      - 5433:5432
    volumes:
      - traccar_postgres_data:/var/lib/postgresql/data

  traccar:
    image: traccar/traccar:latest
    restart: always
    ports:
      - 8082:8082
      - 5000-5150:5000-5150
    depends_on:
      - traccar-db
    volumes:
      - ./__config/traccar/traccar.xml:/opt/traccar/conf/traccar.xml:ro
      - traccar_data:/opt/traccar/data
      - traccar_logs:/opt/traccar/logs

  bc-dev-backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile.dev
    env_file: ./backend/.env.docker
    restart: always
    ports:
      - 4002:4002
    depends_on:
      - mongo
    volumes:
      - cdn:/var/www/cdn/bookcars
      - ./backend:/bookcars/backend
      - /bookcars/backend/node_modules
      - backend_logs:/bookcars/backend/logs

  bc-dev-admin:
    build:
      context: .
      dockerfile: ./admin/Dockerfile.dev
    env_file: ./admin/.env.docker
    restart: always
    depends_on:
      - bc-dev-backend
    ports:
      - 3001:3001
    volumes:
      - ./admin:/bookcars/admin
      - /bookcars/admin/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

  bc-dev-frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile.dev
    env_file: ./frontend/.env.docker
    restart: always
    depends_on:
      - bc-dev-backend
    ports:
      - 8080:8080
      - 8443:443
    volumes:
      - ./frontend:/bookcars/frontend
      - /bookcars/frontend/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

volumes:
  cdn:
  mongodb_data:
  mongodb_config:
  backend_logs:
  traccar_postgres_data:
  traccar_data:
  traccar_logs:
